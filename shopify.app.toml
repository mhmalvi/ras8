# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "H5"
client_id = "2da34c83e89f6645ad1fb2028c7532dd"
application_url = "https://ras-5.vercel.app"
embedded = true

[access_scopes]
# https://shopify.dev/docs/api/usage/access-scopes
scopes = "read_orders,write_orders,read_customers,read_products,write_draft_orders,read_inventory,read_locations"

[auth]
redirect_urls = [
    "https://ras-5.vercel.app/api/oauth/shopify-callback",
    "https://ras-5.vercel.app/auth/callback",
    "https://ras-5.vercel.app/auth/inline",
    "https://ras-5.vercel.app/dashboard",
    "https://ras-5.vercel.app/"
  ]
[webhooks]
api_version = "2024-01"

  [[webhooks.subscriptions]]
  topics = [ "orders/create", "orders/updated", "orders/paid" ]
  uri = "https://pvadajelvewdazwmvppk.supabase.co/functions/v1/enhanced-shopify-webhook"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://pvadajelvewdazwmvppk.supabase.co/functions/v1/enhanced-shopify-webhook"

  [[webhooks.subscriptions]]
  topics = [ "customers/data_request" ]
  uri = "https://pvadajelvewdazwmvppk.supabase.co/functions/v1/shopify-gdpr-webhooks"

  [[webhooks.subscriptions]]
  topics = [ "customers/redact" ]
  uri = "https://pvadajelvewdazwmvppk.supabase.co/functions/v1/shopify-gdpr-webhooks"

  [[webhooks.subscriptions]]
  topics = [ "shop/redact" ]
  uri = "https://pvadajelvewdazwmvppk.supabase.co/functions/v1/shopify-gdpr-webhooks"

[app_proxy]
# Uncomment the following to add an App Proxy
# url = "https://my-app-proxy.com"
# subpath = "apps"
# prefix = "proxy"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_store_url = "{{SHOPIFY_DEV_STORE_URL}}"
include_config_on_deploy = true